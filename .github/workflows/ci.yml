name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

# Force bash for every run step. Inside the golang:bookworm container the default
# shell resolves to dash (/bin/sh), which lacks `set -o pipefail` — the gofmt
# step's `set -euo pipefail` aborts with "Illegal option -o pipefail" before it
# ever runs gofmt. Pinning bash fixes that and keeps all steps on one shell.
defaults:
  run:
    shell: bash

jobs:
  build-test:
    name: build-test (${{ matrix.name }})
    runs-on: ubuntu-latest
    # Run inside the official Go image so no setup-go action is needed; the only
    # pinned action is checkout. Image pinned by digest (tag golang:1.26-bookworm);
    # bump as new Go releases clear the supply-chain quarantine.
    container: golang:1.26-bookworm@sha256:5f68ec6805843bd3981a951ffada82a26a0bd2631045c8f7dba483fa868f5ec5
    strategy:
      # Optional modules are guarded by build tags, so a package only compiles on
      # the legs whose tag set selects it. Cover the full lattice — every module
      # alone and all of them together — or tag-only files (modules_tls.go and its
      # test) never get vetted, built, or run. fail-fast off so one broken tag set
      # does not hide the state of the others.
      fail-fast: false
      matrix:
        include:
          - name: no tags
            tags: ""
          - name: reply
            tags: "reply"
          - name: tls
            tags: "tls"
          - name: reply+tls
            tags: "reply tls"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # The golang container runs as root over a checkout owned by another uid, so
      # git reports "dubious ownership" — which makes `go build` abort VCS stamping
      # with "error obtaining VCS status: exit status 128". Trust the workspace.
      - name: mark workspace safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      # Formatting is tag-independent, so check it once rather than on every leg.
      - name: gofmt
        if: matrix.tags == ''
        run: |
          set -euo pipefail
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"; echo "$unformatted"; exit 1
          fi

      - name: go vet
        run: go vet -tags "${{ matrix.tags }}" ./...

      - name: build
        run: go build -tags "${{ matrix.tags }}" ./...

      - name: test (race)
        run: go test -race -tags "${{ matrix.tags }}" ./...

  # The e2e suite is gated behind its own build tag, so the matrix above never
  # compiles it: `go test -tags "reply tls" ./...` does not select files tagged
  # `e2e`. Without this job the process-level tests — the only ones that run the
  # real binary, drive `demiplane mcp` over stdio pipes, and validate the
  # /connect config artifact — are dead code in CI. One leg with every module
  # tag is enough; the suite builds its own binary with `-tags "reply tls"`
  # regardless (see e2e/main_test.go), so splitting it per tag would test the
  # same binary four times.
  e2e:
    name: e2e (process-level)
    runs-on: ubuntu-latest
    container: golang:1.26-bookworm@sha256:5f68ec6805843bd3981a951ffada82a26a0bd2631045c8f7dba483fa868f5ec5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: mark workspace safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      # The suite spawns subprocesses and binds ephemeral loopback ports, so it
      # is slower and flakier-by-nature than the unit legs. Bound it rather than
      # letting a hung child burn the job's full 6-hour default.
      - name: test (e2e, race)
        run: go test -race -tags "e2e reply tls" -timeout 10m ./e2e/...
