name: Lint GitHub Actions

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install actionlint
        env:
          VERSION: 1.7.12
          SHA256: 8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8
        run: |
          set -euo pipefail
          curl -sSL -o actionlint.tgz "https://github.com/rhysd/actionlint/releases/download/v${VERSION}/actionlint_${VERSION}_linux_amd64.tar.gz"
          echo "${SHA256}  actionlint.tgz" | sha256sum -c
          tar -xzf actionlint.tgz actionlint
          chmod +x actionlint

      - name: Run actionlint
        run: ./actionlint -color

      - name: Install zizmor
        run: pipx install zizmor==1.24.1

      - name: Run zizmor
        run: zizmor --no-progress .
